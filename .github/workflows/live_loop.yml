name: Live Trading Loop

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Symbols to trade (comma separated)'
        required: false
        default: 'SPY,QQQ,IWM'

permissions:
  contents: read
  actions: read

jobs:
  live-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 420 # 7 hours (market session + buffer)
    
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER_TRADING: true
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      STORAGE_ENV: bq
      TRADING_WINDOW_START: '09:30'
      TRADING_WINDOW_END: '12:00'
      END_OF_DAY_CLOSE_TIME: '15:50'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check market open
        run: python scripts/check_market_open.py

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Validate GCP auth
        run: |
          python -m json.tool "$GOOGLE_APPLICATION_CREDENTIALS" > /dev/null
          python - <<'PY'
          from google.cloud import bigquery
          client = bigquery.Client()
          print(f"BigQuery auth OK: {client.project}")
          PY

      - name: Find latest premarket artifact
        id: premarket_artifact
        timeout-minutes: 15
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const formatter = new Intl.DateTimeFormat('en-US', {
              timeZone: 'America/New_York',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
            })
            function etDate(value) {
              const parts = Object.fromEntries(
                formatter.formatToParts(new Date(value)).map((part) => [part.type, part.value])
              )
              return `${parts.year}-${parts.month}-${parts.day}`
            }

            const todayEt = etDate(new Date())
            const deadline = Date.now() + 12 * 60 * 1000

            while (true) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'premarket.yml',
                status: 'completed',
                per_page: 30,
              })
              for (const run of runs) {
                if (run.conclusion !== 'success') continue
                const finishedAt = run.updated_at || run.run_started_at || run.created_at
                if (!finishedAt || etDate(finishedAt) !== todayEt) continue

                const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                })
                const artifact = artifacts.find((item) => item.name === 'premarket-context')
                if (artifact) {
                  core.setOutput('run_id', String(run.id))
                  core.setOutput('artifact_name', artifact.name)
                  core.setOutput('premarket_date', todayEt)
                  return
                }
              }

              if (Date.now() >= deadline) {
                core.setFailed(`No successful premarket-context artifact found for ${todayEt} ET.`)
                return
              }
              core.info(`Waiting for today's premarket-context artifact (${todayEt} ET)...`)
              await new Promise((resolve) => setTimeout(resolve, 30000))
            }

      # Extract at repo root so paths stay ``data/daily_news/<YYYY-MM-DD>/processed/…``.
      # Using ``path: data/daily_news`` duplicates the prefix (nested ``data/daily_news``).
      - name: Download Premarket Context
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.premarket_artifact.outputs.artifact_name }}
          run-id: ${{ steps.premarket_artifact.outputs.run_id }}
          github-token: ${{ github.token }}
          path: .

      - name: Verify premarket context on disk
        env:
          PREMARKET_DATE: ${{ steps.premarket_artifact.outputs.premarket_date }}
        run: |
          set -euo pipefail
          DATE="${PREMARKET_DATE:-}"
          if [ -z "$DATE" ]; then
            echo "premarket_date output missing from Find latest premarket artifact step"
            exit 1
          fi
          DEST="data/daily_news/${DATE}/processed/premarket_context.json"
          if [ -f "$DEST" ]; then
            echo "OK: $DEST"
            exit 0
          fi
          if [ -f premarket_context.json ]; then
            mkdir -p "data/daily_news/${DATE}/processed"
            mv premarket_context.json "$DEST"
            echo "Relocated flat artifact to $DEST"
            exit 0
          fi
          echo "premarket_context.json not found (checked $DEST and repo root)"
          find . -name 'premarket_context.json' 2>/dev/null || true
          exit 1

      - name: Run Live Loop
        run: |
          SYMBOLS="${{ github.event.inputs.symbols || 'SPY,QQQ,IWM' }}"
          SYMBOLS_SPACE=$(echo $SYMBOLS | tr ',' ' ')
          # Run the loop. --fast 60 means 1 minute iterations.
          python scripts/run_live_loop.py --symbols $SYMBOLS_SPACE --use-db --fast 60

      - name: Prepare telemetry artifact paths
        if: always()
        run: touch .telemetry-artifact-anchor

      - name: Upload daily telemetry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-advisor-daily-news-${{ github.run_id }}
          path: |
            data/daily_news/
            .telemetry-artifact-anchor
          if-no-files-found: warn

      - name: Notify Discord on Failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **LLM Advisor Live Loop Failed**\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            $DISCORD_WEBHOOK_URL
