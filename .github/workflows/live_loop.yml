name: Live Trading Loop

on:
  schedule:
    # MINUTE HOUR — see premarket.yml. ~9:26 NY dual UTC + ET window guard on scheduled runs.
    - cron: '26 13 * * 1-5'
    - cron: '26 14 * * 1-5'
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Symbols to trade (comma separated)'
        required: false
        default: 'SPY,QQQ,IWM'

permissions:
  contents: read
  actions: read

jobs:
  live-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 420 # 7 hours (market session + buffer)
    
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER_TRADING: true
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      STORAGE_ENV: bq
      TRADING_WINDOW_START: '09:30'
      TRADING_WINDOW_END: '12:00'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Belt-and-suspenders: if Actions queues a duplicate schedule late same ET day, skip after a success.
      - name: Skip scheduled run if Live already succeeded today (America/New_York)
        id: dupe_gate
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = int(os.environ["GITHUB_RUN_ID"])
          owner, name = repo.split("/", 1)
          et = ZoneInfo("America/New_York")
          today_et = datetime.now(et).date().isoformat()

          url = (
              f"https://api.github.com/repos/{owner}/{name}/actions/workflows/live_loop.yml/runs"
              "?branch=main&status=completed&per_page=20"
          )
          req = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          for wr in data.get("workflow_runs", []):
              if wr.get("conclusion") != "success":
                  continue
              if wr.get("id") == run_id:
                  continue
              finished = wr.get("updated_at") or wr.get("run_started_at")
              if not finished:
                  continue
              dt = datetime.fromisoformat(finished.replace("Z", "+00:00")).astimezone(et)
              if dt.date().isoformat() == today_et:
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gh:
                      gh.write("skip=true\n")
                  print(f"Skip: successful Live run {wr['id']} already finished today ET ({today_et}).")
                  raise SystemExit(0)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gh:
              gh.write("skip=false\n")
          print("Proceed: no prior successful Live run today ET.")
          PY

      - name: Scheduled skip notice
        if: github.event_name == 'schedule' && steps.dupe_gate.outputs.skip == 'true'
        run: echo "Skipping Live loop — duplicate schedule after successful run today (ET)."

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        if: github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check market open and scheduled ET window (~9:26 NY)
        id: market_gate
        if: github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true'
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="--scheduled-et-window 09:18 10:12"
          fi
          python scripts/check_market_open.py $ARGS

      - name: Scheduled noop outside ET window
        if: success() && github.event_name == 'schedule' && steps.dupe_gate.outputs.skip != 'true' && steps.market_gate.outputs.skip_remaining_steps == 'true'
        run: echo "Skipping Live — outside dual-cron ET guard window."

      - name: Auth GCP
        if: success() && (github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true') && steps.market_gate.outputs.skip_remaining_steps != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Validate GCP auth
        if: success() && (github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true') && steps.market_gate.outputs.skip_remaining_steps != 'true'
        run: |
          python -m json.tool "$GOOGLE_APPLICATION_CREDENTIALS" > /dev/null
          python - <<'PY'
          from google.cloud import bigquery
          client = bigquery.Client()
          print(f"BigQuery auth OK: {client.project}")
          PY

      - name: Find latest premarket artifact
        id: premarket_artifact
        if: success() && (github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true') && steps.market_gate.outputs.skip_remaining_steps != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'premarket.yml',
              status: 'completed',
              per_page: 20,
            })
            for (const run of runs) {
              if (run.conclusion !== 'success') continue
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              })
              const artifact = artifacts.find((item) => item.name === 'premarket-context')
              if (artifact) {
                core.setOutput('run_id', String(run.id))
                core.setOutput('artifact_name', artifact.name)
                return
              }
            }
            core.setFailed('No successful premarket-context artifact found.')

      # Extract at repo root so paths stay ``data/daily_news/<YYYY-MM-DD>/processed/…``.
      # Using ``path: data/daily_news`` duplicates the prefix (nested ``data/daily_news``).
      - name: Download Premarket Context
        if: success() && (github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true') && steps.market_gate.outputs.skip_remaining_steps != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.premarket_artifact.outputs.artifact_name }}
          run-id: ${{ steps.premarket_artifact.outputs.run_id }}
          github-token: ${{ github.token }}
          path: .

      - name: Verify premarket paths (debug)
        if: success() && (github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true') && steps.market_gate.outputs.skip_remaining_steps != 'true'
        run: |
          find data/daily_news -type f -name 'premarket_context.json' 2>/dev/null | sort || true
          find data/daily_news/data/daily_news -type f -name 'premarket_context.json' 2>/dev/null | sort || true

      - name: Run Live Loop
        if: success() && (github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true') && steps.market_gate.outputs.skip_remaining_steps != 'true'
        run: |
          SYMBOLS="${{ github.event.inputs.symbols || 'SPY,QQQ,IWM' }}"
          SYMBOLS_SPACE=$(echo $SYMBOLS | tr ',' ' ')
          # Run the loop. --fast 60 means 1 minute iterations.
          python scripts/run_live_loop.py --symbols $SYMBOLS_SPACE --use-db --fast 60

      - name: Upload daily telemetry artifacts
        if: always() && (github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true') && steps.market_gate.outputs.skip_remaining_steps != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: llm-advisor-daily-news-${{ github.run_id }}
          path: data/daily_news/**/processed/*
          if-no-files-found: warn

      - name: Notify Discord on Failure
        if: failure() && (github.event_name != 'schedule' || steps.dupe_gate.outputs.skip != 'true') && steps.market_gate.outputs.skip_remaining_steps != 'true'
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **LLM Advisor Live Loop Failed**\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            $DISCORD_WEBHOOK_URL
