name: Premarket Pipeline

on:
  schedule:
    # ~7:20 AM America/New_York (UTC via dual rules — GitHub cron is UTC-only)
    # EDT:  7:20 ET → 11:20 UTC
    # EST:  7:20 ET → 12:20 UTC
    - cron: '20 11 * * 1-5'
    - cron: '20 12 * * 1-5'
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Symbols to process (comma separated)'
        required: false
        default: 'SPY,QQQ,IWM'

jobs:
  premarket:
    runs-on: ubuntu-latest
    
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      STORAGE_ENV: bq

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Validate GCP auth
        run: |
          python -m json.tool "$GOOGLE_APPLICATION_CREDENTIALS" > /dev/null
          python - <<'PY'
          from google.cloud import bigquery
          client = bigquery.Client()
          print(f"BigQuery auth OK: {client.project}")
          PY

      - name: Check Market Open
        id: market_check
        run: python scripts/check_market_open.py
        continue-on-error: false

      - name: Run Premarket Pipeline
        run: |
          SYMBOLS="${{ github.event.inputs.symbols || 'SPY,QQQ,IWM' }}"
          # Convert comma separated to space separated for the script
          SYMBOLS_SPACE=$(echo $SYMBOLS | tr ',' ' ')
          python scripts/run_premarket.py --symbols $SYMBOLS_SPACE --use-db

      - name: Upload Premarket Context
        uses: actions/upload-artifact@v4
        with:
          name: premarket-context
          path: data/daily_news/*/processed/premarket_context.json
          retention-days: 1
