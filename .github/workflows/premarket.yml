name: Premarket Pipeline

on:
  schedule:
    # GitHub schedule defaults to UTC; timezone pins this to the NYSE wall clock through DST.
    - cron: '20 9 * * 1-5'
      timezone: "America/New_York"
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Symbols to process (comma separated)'
        required: false
        default: 'SPY,QQQ,IWM'

jobs:
  premarket:
    runs-on: ubuntu-latest
    
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      STORAGE_ENV: bq

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check market open and scheduled ET window (~9:20 NY)
        id: market_gate
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="--scheduled-et-window 09:05 09:30"
          fi
          python scripts/check_market_open.py $ARGS

      - name: Fail scheduled run outside ET window
        if: success() && steps.market_gate.outputs.skip_remaining_steps == 'true'
        run: |
          echo "Premarket schedule missed the 09:05-09:30 ET guard window; failing so we do not create late/stale artifacts."
          exit 1

      - name: Auth GCP
        if: success() && steps.market_gate.outputs.skip_remaining_steps != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Validate GCP auth
        if: success() && steps.market_gate.outputs.skip_remaining_steps != 'true'
        run: |
          python -m json.tool "$GOOGLE_APPLICATION_CREDENTIALS" > /dev/null
          python - <<'PY'
          from google.cloud import bigquery
          client = bigquery.Client()
          print(f"BigQuery auth OK: {client.project}")
          PY

      - name: Run Premarket Pipeline
        if: success() && steps.market_gate.outputs.skip_remaining_steps != 'true'
        run: |
          SYMBOLS="${{ github.event.inputs.symbols || 'SPY,QQQ,IWM' }}"
          SYMBOLS_SPACE=$(echo $SYMBOLS | tr ',' ' ')
          python scripts/run_premarket.py --symbols $SYMBOLS_SPACE --use-db

      - name: Upload Premarket Context
        if: success() && steps.market_gate.outputs.skip_remaining_steps != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: premarket-context
          path: data/daily_news/*/processed/premarket_context.json
          retention-days: 1
