name: Premarket Pipeline

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Symbols to process (comma separated)'
        required: false
        default: 'SPY,QQQ,IWM'

jobs:
  premarket:
    runs-on: ubuntu-latest
    
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_DATA_FEED: ${{ vars.ALPACA_DATA_FEED || 'iex' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      STORAGE_ENV: bq

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify daily bias model artifacts
        run: |
          set -euo pipefail
          for s in SPY QQQ IWM; do
            test -f "models/${s}_daily_bias.pkl"
            test -f "models/${s}_label_encoder.pkl"
          done
          echo "OK: bias model files present"

      - name: Check market open
        run: python scripts/check_market_open.py

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Validate GCP auth
        run: |
          python -m json.tool "$GOOGLE_APPLICATION_CREDENTIALS" > /dev/null
          python - <<'PY'
          from google.cloud import bigquery
          client = bigquery.Client()
          print(f"BigQuery auth OK: {client.project}")
          PY

      - name: Run Premarket Pipeline
        run: |
          echo "Using Alpaca data feed: ${ALPACA_DATA_FEED}"
          SYMBOLS="${{ github.event.inputs.symbols || 'SPY,QQQ,IWM' }}"
          SYMBOLS_SPACE=$(echo $SYMBOLS | tr ',' ' ')
          python scripts/run_premarket.py --symbols $SYMBOLS_SPACE --use-db

      # Anchor at repo root so upload-artifact LCA stays ``.`` and paths remain
      # ``data/daily_news/<date>/processed/premarket_context.json`` (not a bare filename).
      - name: Prepare artifact paths
        run: touch .premarket-artifact-anchor

      - name: Upload Premarket Context
        uses: actions/upload-artifact@v4
        with:
          name: premarket-context
          path: |
            data/daily_news/
            .premarket-artifact-anchor
          retention-days: 1
