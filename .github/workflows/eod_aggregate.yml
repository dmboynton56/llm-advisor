name: EOD Aggregate

on:
  workflow_run:
    workflows: ["Live Trading Loop"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      date:
        description: "Optional date (YYYY-MM-DD)"
        required: false
        default: ""
      live_loop_run_id:
        description: "Optional GitHub Actions run id for Live Trading Loop (use that job's artifact)"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  aggregate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_DATASET_ID: ${{ secrets.GCP_DATASET_ID }}
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
      SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PORTFOLIO_METRICS_URL: ${{ secrets.PORTFOLIO_METRICS_URL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Find live-loop telemetry artifact
        id: live_artifact
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function useRun(runId) {
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner,
                repo,
                run_id: runId,
                per_page: 100,
              });
              const artifact = artifacts.find((item) => item.name.startsWith('llm-advisor-daily-news-'));
              if (!artifact) {
                core.setFailed(`No llm-advisor-daily-news-* artifact on workflow run ${runId}.`);
                return false;
              }
              core.setOutput('run_id', String(runId));
              core.setOutput('artifact_name', artifact.name);
              core.setOutput('skip_remaining_steps', 'false');
              return true;
            }

            async function useTriggeringRun(runId) {
              const deadline = Date.now() + 3 * 60 * 1000;
              while (true) {
                const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                  owner,
                  repo,
                  run_id: runId,
                  per_page: 100,
                });
                const artifact = artifacts.find((item) => item.name.startsWith('llm-advisor-daily-news-'));
                if (artifact) {
                  core.setOutput('run_id', String(runId));
                  core.setOutput('artifact_name', artifact.name);
                  core.setOutput('skip_remaining_steps', 'false');
                  return;
                }
                if (Date.now() >= deadline) {
                  core.notice(`No llm-advisor-daily-news-* artifact on triggering Live run ${runId}; skipping EOD aggregate.`);
                  core.setOutput('skip_remaining_steps', 'true');
                  return;
                }
                core.info(`Waiting for telemetry artifact on triggering Live run ${runId}...`);
                await new Promise((resolve) => setTimeout(resolve, 15000));
              }
            }

            const manualId = (context.payload.inputs && context.payload.inputs.live_loop_run_id || '').trim();
            if (manualId) {
              const n = parseInt(manualId, 10);
              if (Number.isNaN(n)) {
                core.setFailed(`Invalid live_loop_run_id: ${manualId}`);
                return;
              }
              await useRun(n);
              return;
            }

            if (context.eventName === 'workflow_run') {
              await useTriggeringRun(context.payload.workflow_run.id);
              return;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: 'live_loop.yml',
              status: 'completed',
              per_page: 25,
            });
            for (const run of runs) {
              if (run.conclusion !== 'success') continue;
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner,
                repo,
                run_id: run.id,
                per_page: 100,
              });
              const artifact = artifacts.find((item) => item.name.startsWith('llm-advisor-daily-news-'));
              if (artifact) {
                core.setOutput('run_id', String(run.id));
                core.setOutput('artifact_name', artifact.name);
                core.setOutput('skip_remaining_steps', 'false');
                return;
              }
            }
            core.setFailed('No successful live-loop telemetry artifact found.')

      - name: EOD noop when triggering Live had no telemetry
        if: steps.live_artifact.outputs.skip_remaining_steps == 'true'
        run: echo "Skipping EOD aggregate because the triggering Live workflow produced no telemetry artifact."

      # Extract at repo root so paths stay ``data/daily_news/<YYYY-MM-DD>/processed/…``.
      # Using ``path: data/daily_news`` duplicates the prefix (nested ``data/daily_news``).
      - name: Download live-loop telemetry artifact
        if: steps.live_artifact.outputs.skip_remaining_steps != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.live_artifact.outputs.artifact_name }}
          run-id: ${{ steps.live_artifact.outputs.run_id }}
          github-token: ${{ github.token }}
          path: .

      - name: Normalize telemetry layout
        if: steps.live_artifact.outputs.skip_remaining_steps != 'true'
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            python scripts/normalize_telemetry_layout.py --date "$DATE"
          else
            python scripts/normalize_telemetry_layout.py
          fi

      - name: List downloaded telemetry tree
        if: steps.live_artifact.outputs.skip_remaining_steps != 'true'
        run: |
          find data/daily_news -type f 2>/dev/null | sort || true
          echo "---- duplicate-prefix probe ----"
          find data/daily_news/data/daily_news -type f 2>/dev/null | sort | head -50 || true

      - name: Auth GCP
        if: ${{ steps.live_artifact.outputs.skip_remaining_steps != 'true' && env.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Run EOD aggregate
        if: steps.live_artifact.outputs.skip_remaining_steps != 'true'
        run: |
          BQ_FLAG=""
          if [ -n "${GCP_PROJECT_ID:-}" ]; then BQ_FLAG="--use-bigquery"; fi
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/run_eod_aggregate.py --date "${{ github.event.inputs.date }}" --validate $BQ_FLAG
          else
            python scripts/run_eod_aggregate.py --lookback-days 3 --validate $BQ_FLAG
          fi

      - name: Sync BigQuery to Supabase (rolling window)
        if: ${{ steps.live_artifact.outputs.skip_remaining_steps != 'true' && env.GCP_PROJECT_ID != '' }}
        run: python scripts/sync_bq_to_supabase.py --days 14

      - name: Telemetry layout on EOD failure
        if: failure() && steps.live_artifact.outputs.skip_remaining_steps != 'true'
        run: |
          echo "---- find data/daily_news ----"
          find data/daily_news -type f 2>/dev/null | sort || true
          echo "---- directory tree ----"
          find data/daily_news -type d 2>/dev/null | sort || true

      - name: Validate Supabase telemetry freshness
        if: steps.live_artifact.outputs.skip_remaining_steps != 'true'
        run: |
          python - <<'PY'
          import os
          import psycopg2

          host = os.environ.get("SUPABASE_DB_HOST")
          db = os.environ.get("SUPABASE_DB_NAME", "postgres")
          user = os.environ.get("SUPABASE_DB_USER", "postgres")
          port = int(os.environ.get("SUPABASE_DB_PORT", "5432"))
          password = os.environ.get("SUPABASE_DB_PASSWORD")
          if not host or not password:
              raise SystemExit("Missing Supabase DB credentials.")

          conn = psycopg2.connect(
              host=host,
              dbname=db,
              user=user,
              password=password,
              port=port,
              sslmode="require",
          )
          with conn, conn.cursor() as cur:
              cur.execute("SELECT COUNT(*) FROM llm_advisor_backtest_runs WHERE run_date >= CURRENT_DATE - INTERVAL '7 days'")
              runs = int(cur.fetchone()[0])
              cur.execute("SELECT COUNT(*) FROM llm_advisor_runtime_heartbeats WHERE heartbeat_ts >= NOW() - INTERVAL '7 days'")
              heartbeats = int(cur.fetchone()[0])
              cur.execute("SELECT COUNT(*) FROM llm_advisor_backtest_trades WHERE run_date >= CURRENT_DATE - INTERVAL '7 days'")
              trades = int(cur.fetchone()[0])

          print(f"7d rows => runs={runs} trades={trades} heartbeats={heartbeats}")
          strict = os.environ.get("EOD_STRICT_TELEMETRY", "").lower() in ("1", "true", "yes")
          if runs <= 0 or heartbeats <= 0:
              msg = "EOD verification: expected runs>0 and heartbeats>0 in last 7 days."
              if strict:
                  raise SystemExit(msg)
              print(f"WARNING: {msg} (set EOD_STRICT_TELEMETRY=1 in repo secrets to fail on this).")
          PY

      - name: Require metrics endpoint on main
        if: steps.live_artifact.outputs.skip_remaining_steps != 'true' && github.ref == 'refs/heads/main' && env.PORTFOLIO_METRICS_URL != ''
        run: |
          echo "PORTFOLIO_METRICS_URL is set — production metrics gate active."

      - name: Warn when metrics URL missing on main
        if: steps.live_artifact.outputs.skip_remaining_steps != 'true' && github.ref == 'refs/heads/main' && env.PORTFOLIO_METRICS_URL == ''
        run: 'echo "::warning::PORTFOLIO_METRICS_URL secret not set — add it for portfolio CI verification"'

      - name: Validate portfolio-facing metrics endpoint (optional)
        if: steps.live_artifact.outputs.skip_remaining_steps != 'true' && env.PORTFOLIO_METRICS_URL != ''
        run: |
          curl --fail --silent "$PORTFOLIO_METRICS_URL?source=supabase&force=true" > /tmp/metrics_response.json
          python - <<'PY'
          import json
          with open('/tmp/metrics_response.json', 'r', encoding='utf-8') as f:
              payload = json.load(f)
          data = payload.get('data', payload)
          meta = payload.get('meta', {})
          runs = (data.get('coverage') or {}).get('runCount', 0)
          source = meta.get('source')
          if runs <= 0:
              raise SystemExit("Portfolio metrics endpoint returned zero runCount")
          if source != "supabase":
              raise SystemExit(f"Portfolio metrics endpoint did not return supabase source (got {source!r})")
          print(f"runCount={runs}")
          PY

      - name: Notify Discord on Success
        if: success() && steps.live_artifact.outputs.skip_remaining_steps != 'true' && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ **LLM Advisor EOD Aggregate Succeeded**\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on Failure
        if: failure() && steps.live_artifact.outputs.skip_remaining_steps != 'true' && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **LLM Advisor EOD Aggregate Failed**\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"
